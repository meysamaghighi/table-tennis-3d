<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Phase 2 Harness — Shot Solver Validation</title>
<style>
  body { background:#111; color:#eee; font-family: monospace; padding: 16px; }
  #summary { font-size: 1.1em; margin-bottom: 12px; }
  .pass { color: #4caf50; }
  .fail { color: #ff5252; }
  table { border-collapse: collapse; font-size: 0.8em; }
  td, th { border: 1px solid #333; padding: 2px 6px; text-align: right; }
  th { color: #9cf; }
</style>
</head>
<body>
<h2>Phase 2 Harness — ShotSolver Validation</h2>
<div id="summary">Running…</div>
<div id="table-wrap"></div>
<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>
<script type="module">
  import { runValidation } from './validate_solver.js';

  const { rows, passed, total, passRate } = runValidation();

  const summaryEl = document.getElementById('summary');
  const pct = (passRate * 100).toFixed(1);
  const cls = passRate >= 0.95 ? 'pass' : 'fail';
  summaryEl.innerHTML = `<span class="${cls}">${passed} / ${total} within 10cm (${pct}%) — target 95%</span>`;
  console.log(`ShotSolver validation: ${passed}/${total} passed (${pct}%)`);

  // Only render failures in the table (486 rows is too much to eyeball).
  const failures = rows.filter(r => !r.ok);
  const wrap = document.getElementById('table-wrap');
  if (failures.length) {
    const header = '<tr><th>contact.y</th><th>contact.z</th><th>target.x</th><th>target.z</th><th>arc</th><th>spin.x</th><th>error(m)</th><th>reason</th></tr>';
    const body = failures.slice(0, 200).map(r => `<tr>
      <td>${r.contact.y}</td><td>${r.contact.z}</td><td>${r.targetLanding.x}</td><td>${r.targetLanding.z}</td>
      <td>${r.arcHeight}</td><td>${r.spin.x}</td>
      <td>${Number.isFinite(r.error) ? r.error.toFixed(3) : 'inf'}</td><td>${r.reason}</td>
    </tr>`).join('');
    wrap.innerHTML = `<table>${header}${body}</table>`;
    console.log(`${failures.length} failing rows (showing up to 200):`);
    console.table(failures.slice(0, 200).map(r => ({
      contactY: r.contact.y, contactZ: r.contact.z, targetX: r.targetLanding.x, targetZ: r.targetLanding.z,
      arcHeight: r.arcHeight, spinX: r.spin.x, error: r.error, reason: r.reason,
    })));
  }

  window.__validationDone = true;
  window.__validationPassed = passed;
  window.__validationTotal = total;
  window.__validationPassRate = passRate;
</script>
</body>
</html>
