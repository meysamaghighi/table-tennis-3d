<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Camera framing preview</title>
<style>
  html,body { margin:0; background:#333; }
  #wrap { display:inline-block; }
  iframe { border:0; display:block; }
</style>
</head>
<body>
<div id="wrap"><iframe id="f" src="/index.html"></iframe></div>
<script>
  const p = new URLSearchParams(location.search);
  const w = +p.get('w') || 390, h = +p.get('h') || 720;
  const f = document.getElementById('f');
  f.width = w; f.height = h;
  f.addEventListener('load', () => {
    const idoc = f.contentDocument, iwin = f.contentWindow;
    idoc.body.classList.add('touch-device');
    const tryStart = () => {
      const b = idoc.getElementById('btn-quick-match');
      if (b) { b.click(); window.__started = true; }
      else setTimeout(tryStart, 100);
    };
    setTimeout(tryStart, 400);
  });
</script>
</body>
</html>
